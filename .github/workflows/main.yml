name: APK_Uretici
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle
      - name: Yetki Ver
        run: chmod +x gradlew
      - name: APK Derle
        run: ./gradlew assembleDebug
      - name: Yukle
        uses: actions/upload-artifact@v3
        with:
          name: Uygulamam
          path: app/build/outputs/apk/debug/*.apk
